# =============================================================================
# TERMINAL & COLORS
# =============================================================================
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:RGB"
set -as terminal-overrides ",xterm*:Tc"
set -sg escape-time 0

# =============================================================================
# GENERAL BEHAVIOR
# =============================================================================
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g focus-events on
set -g set-clipboard on

# =============================================================================
# CATPPUCCIN OPTIONS  (must come BEFORE the catppuccin run line)
# =============================================================================
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_flags "icon"
set -g @catppuccin_pane_active_border_style "fg=#{@thm_mauve}"
set -g @catppuccin_pane_border_style "fg=#{@thm_overlay_0}"
set -g @catppuccin_date_time_text " %a %d %b  %H:%M"

# =============================================================================
# PLUGINS
# =============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-resurrect'   # Ctrl+B Ctrl+s to save, Ctrl+B Ctrl+r to restore
set -g @plugin 'catppuccin/tmux#v2.1.3'

set -g @resurrect-strategy-nvim 'session'
set -g @cpu_percentage_format "%3.0f%%"
set -g @batt_remain_short "true"

# =============================================================================
# STATUS BAR  (must come AFTER catppuccin run, BEFORE tpm run)
# =============================================================================
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'

run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

set -g status-left-length 100
set -g status-right-length 100
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_battery}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

# =============================================================================
# TPM — must be the very last line
# =============================================================================
run ~/.config/tmux/plugins/tpm/tpm
